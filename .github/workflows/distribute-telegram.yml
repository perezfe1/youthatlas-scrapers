name: Telegram Distribution

on:
  # Runs automatically after the ingest pipeline completes successfully
  workflow_run:
    workflows: ["Daily Ingest Pipeline"]
    types: [completed]

  # Manual trigger from the GitHub Actions UI
  workflow_dispatch:

# Prevent overlapping distribution runs — let one finish before queuing another.
concurrency:
  group: distribute-telegram
  cancel-in-progress: false

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # On workflow_run: only proceed if the ingest pipeline succeeded.
    # On workflow_dispatch: always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Telegram distribution
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PUBLIC_CHANNEL_ID: ${{ secrets.TELEGRAM_PUBLIC_CHANNEL_ID }}
        run: pnpm distribute:telegram:ci
