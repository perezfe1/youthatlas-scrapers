name: Daily Ingest Pipeline

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily

  workflow_dispatch:      # manual trigger from GitHub UI
    inputs:
      scraper:
        description: 'Specific scraper to run (leave empty for all)'
        required: false
        type: string
      limit:
        description: 'Max pages per scraper (leave empty for no limit)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (extract only, skip store)'
        required: false
        type: boolean
        default: false

# Prevent overlapping runs — let a running pipeline finish before queuing another.
concurrency:
  group: ingest-pipeline
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9   # no packageManager field in package.json — pin explicitly

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Build command dynamically from workflow_dispatch inputs.
          # On scheduled runs all inputs are empty/false, so CMD stays as-is.
          CMD="pnpm pipeline:ci"
          if [ -n "${{ inputs.scraper }}" ]; then
            CMD="$CMD --scraper=${{ inputs.scraper }}"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            CMD="$CMD --limit=${{ inputs.limit }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Executing: $CMD"
          eval "$CMD"

      # Crawlee writes request/session cache to ./storage/ during the run.
      # In CI this directory is ephemeral and discarded automatically with the runner —
      # no cleanup step needed. For local runs, add storage/ to .gitignore.
